name: 📉 데이터 오류 (주가 / 시가총액 / 재무 데이터)
description: 리포트에 포함된 주가, 시가총액, 밸류에이션 또는 재무 데이터가 잘못된 경우
title: "[Data] "
labels: ["data"]
body:
  - type: markdown
    attributes:
      value: |
        피드백 감사합니다 🙏 데이터 오류는 **검증 가능한 근거를 반드시 제공해 주세요.**
        구체적인 종목 + 잘못된 수치 + 올바른 수치 + **출처 링크**가 필요합니다.
        "데이터가 자주 틀린다"처럼 구체적인 예시 없이 작성된 이슈는 보완 요청될 수 있습니다.

  - type: input
    id: ticker
    attributes:
      label: 해당 종목 / 종목코드
      placeholder: "삼성전자 005930 / SK하이닉스 000660 / 카카오 035720"
    validations:
      required: true

  - type: input
    id: source
    attributes:
      label: 오류가 발생한 스킬 또는 리포트
      description: 어떤 스킬에서 생성된 것인지, 또는 reports/ 폴더의 어느 파일인지 (경로 또는 링크)
      placeholder: "reports/삼성전자/삼성전자-research-20260101.md 또는 /investment-research"
    validations:
      required: true

  - type: textarea
    id: wrong-value
    attributes:
      label: 잘못된 데이터 내용
      description: 어떤 항목(주가/시가총액/PER/매출 등)이 잘못되었고, 리포트에 표시된 값은 무엇인가요?
      placeholder: "리포트에 '시가총액 350조원'으로 표시됨"
    validations:
      required: true

  - type: textarea
    id: correct-value
    attributes:
      label: 올바른 수치 + 출처 (필수)
      description: 올바른 값은 무엇인가요? **출처 링크를 반드시 첨부**하고, 권리락/증자/환율 등 기준 차이가 있다면 명시해 주세요.
      placeholder: |
        올바른 시가총액은 약 410조원입니다.
        출처: https://finance.naver.com/item/main.nhn?code=005930
        원인: 리포트가 구형 발행주식수를 사용한 것으로 추정
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: 재현 명령어 / 순서
      placeholder: "/investment-research 삼성전자"
    validations:
      required: true

  - type: checkboxes
    id: confirm
    attributes:
      label: 확인
      options:
        - label: 기존 이슈를 검색했으며 중복이 없음을 확인했습니다
          required: true
        - label: 올바른 수치와 검증 가능한 출처 링크를 제공했습니다
          required: true

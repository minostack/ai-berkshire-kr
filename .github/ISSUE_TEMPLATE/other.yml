name: 💬 토론 / 새 스킬 제안 / 기타
description: 새 스킬 제안, 사용법 토론, 감사 인사 또는 일반 피드백 (오류/데이터/개선 제안 외)
title: "[토론] "
labels: ["discussion"]
body:
  - type: markdown
    attributes:
      value: |
        **문제가 아닌** 소통을 위한 공간입니다: 새 스킬 제안, 사용법 토론, 감사 인사 등.
        스킬 오류, 데이터 오류, 개선 제안에 해당하는 경우 해당 전용 템플릿을 사용해 주세요.
        (전용 템플릿은 재현 정보가 필요합니다.)

  - type: textarea
    id: content
    attributes:
      label: 내용
      description: |
        토론하거나 제안하고 싶은 내용을 자유롭게 작성해 주세요.
        새 스킬 제안이라면 어떤 리서치 상황을 해결하는지, 기존 스킬과 어떻게 다른지 설명해 주시면 좋습니다.
    validations:
      required: true

  - type: checkboxes
    id: confirm
    attributes:
      label: 확인
      options:
        - label: 기존 이슈를 검색했으며 중복이 없음을 확인했습니다
          required: true
        - label: 스킬 오류 / 데이터 오류 / 개선 제안이 아닙니다 (해당 항목은 전용 템플릿 사용)
          required: true

name: 💡 개선 제안
description: 리포트 형식, 스킬 흐름 또는 프레임워크에 대한 개선 제안
title: "[제안] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        제안 감사합니다 🙏 **구체적이고 재현 가능한 예시를 함께 제공해 주세요.**
        어떤 리포트의 어떤 항목에서 문제를 발견했는지, 어떻게 바꾸면 좋은지를 알려주세요.
        "읽기 불편하다"처럼 출처 없이 추상적으로만 작성된 제안은 보완 요청될 수 있습니다.

  - type: textarea
    id: problem
    attributes:
      label: 발견한 문제 + 구체적인 출처 (필수)
      description: 어떤 리포트의 어느 부분에서 발견했나요? 링크나 스크린샷, 또는 해당 문장을 붙여넣어 주세요.
      placeholder: |
        reports/멀티기업-checklist-20260101.md 의 시가총액 비교표에서
        삼성전자는 원화, 애플은 달러로 혼용되어 있어 직접 비교가 어렵습니다.
    validations:
      required: true

  - type: textarea
    id: expectation
    attributes:
      label: 기대하는 개선 결과 (필수)
      description: '"현재 이렇게 되어 있음 → 이렇게 바뀌면 좋겠음" 형태로 작성하면 반영되기 쉽습니다.'
      placeholder: |
        현재: 시가총액 열에 원화/달러가 혼용됨
        개선안: 크로스마켓 비교표에서는 모두 달러로 환산하고 환율 기준 명시
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: 추가 설명 (선택)
    validations:
      required: false

  - type: checkboxes
    id: confirm
    attributes:
      label: 확인
      options:
        - label: 기존 이슈를 검색했으며 중복이 없음을 확인했습니다
          required: true
        - label: 구체적인 출처와 기대 결과를 제공했습니다 (추상적 묘사만 있는 것이 아님)
          required: true
